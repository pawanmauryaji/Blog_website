{% extends "base.html" %}

{% block content %}
<main class="min-h-[85vh] bg-slate-50 flex items-center justify-center px-4 py-12">
    
    
    <div class="w-full max-w-2xl bg-white border border-slate-200 p-8 rounded-2xl shadow-xs">
        
        
        <div class="mb-8 pb-6 border-b border-slate-100">
            <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Write a New Story</h2>
            <p class="text-sm text-slate-500 mt-1">Share your knowledge and insights with the DevHub community.</p>
        </div>

        
        <form action="/blog/create" method="POST" class="space-y-6">
            
            
            <div>
                <label for="title" class="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-2">Blog Title</label>
                <input type="text" id="title" name="title" required maxlength="255" placeholder="e.g., Master FastAPI Middleware Like a Pro"
                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-base text-slate-900 font-medium focus:outline-none focus:border-orange-500 focus:bg-white transition-colors placeholder:text-slate-400">
            </div>

            
            <div>
                <label for="tag" class="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-2">Select Topic / Tag</label>
                <select id="tag" name="tag" required
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-900 font-medium focus:outline-none focus:border-orange-500 focus:bg-white transition-colors cursor-pointer">
                    <option value="Development" selected>Development</option>
                    <option value="Python">Python </option>
                    <option value="Web Design">Web Design </option>
                    <option value="Database">Database</option>
                    <option value="Cloud">Cloud </option>
                </select>
            </div>

            
            <div>
                <label for="content" class="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-2">Story Content</label>
                <textarea id="content" name="content" required rows="10" placeholder="Tell your story... You can type here your full tutorial or thoughts."
                          class="w-full resize-none bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-base text-slate-900 focus:outline-none focus:border-orange-500 focus:bg-white transition-colors placeholder:text-slate-400 font-sans leading-relaxed"></textarea>
            </div>

            
            <div class="flex items-center justify-end gap-4 pt-4 border-t border-slate-100">
                <a href="/" class="text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors">
                    Cancel
                </a>
                <button type="submit" 
                        class="bg-orange-500 hover:bg-orange-600 text-white font-semibold text-sm px-6 py-3 rounded-xl transition-colors cursor-pointer shadow-md shadow-orange-500/10">
                    Publish Story
                </button>
            </div>
            
        </form>

    </div>
</main>
{% endblock %}
