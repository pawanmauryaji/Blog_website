{% extends "base.html" %}

{% block content %}
<main class="min-h-[85vh] flex items-center justify-center px-4 py-12 bg-slate-100">
    
    
    <div class="w-full max-w-md border border-slate-200 bg-white p-8 rounded-xl shadow-xs">
        
        
        <div class="mb-6 text-center">
            <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Reset Your Password</h2>
            <p class="text-sm text-slate-500 mt-1">Provide authentication details to secure your account</p>
        </div>

        
        <form action="/auth/forgot-password" method="POST" class="space-y-4">

          

            
            <div>
                <label for="email" class="block text-xs font-medium text-slate-700 mb-1.5">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="john@example.com"
                       class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-900 focus:outline-none focus:border-orange-500 focus:bg-white transition-colors">
            </div>

            
            <div>
                <label for="password" class="block text-xs font-medium text-slate-700 mb-1.5">Password</label>
                <div class="relative flex items-center">
                    
                    <input type="password" id="password" name="password" required placeholder="••••••••"
                           class="w-full bg-slate-50 border border-slate-200 rounded-lg pl-3 pr-10 py-2 text-sm text-slate-900 focus:outline-none focus:border-orange-500 focus:bg-white transition-colors">
                    
                    
                    <button type="button" id="toggle-password-btn" class="absolute right-3 text-slate-400 hover:text-slate-600 focus:outline-none cursor-pointer">
                        
                        <svg id="eye-open-icon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                        
                        <svg id="eye-close-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.025 10.025 0 014.132-5.4M9.62 4.315A10.014 10.014 0 0112 4c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.4M9.88 9.88a3 3 0 104.24 4.24M3 3l18 18" />
                        </svg>
                    </button>
                </div>
            </div>

        
            
            <button type="submit" 
                    class="w-full bg-orange-500 hover:bg-orange-600 text-white font-medium text-sm py-2.5 rounded-lg transition-colors cursor-pointer shadow-xs mt-4">
                Update Password
            </button>
        </form>

        
        <p class="text-center text-xs text-slate-500 mt-6 pt-4 border-t border-slate-100">
            Back to Login? <a href="/auth/login" class="text-orange-500 font-medium hover:underline">Sign in</a>
        </p>

    </div>
</main>


<script>
    const passwordInput = document.getElementById('password');
    const togglePasswordBtn = document.getElementById('toggle-password-btn');
    const eyeOpenIcon = document.getElementById('eye-open-icon');
    const eyeCloseIcon = document.getElementById('eye-close-icon');

    togglePasswordBtn.addEventListener('click', () => {
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeOpenIcon.classList.add('hidden');
            eyeCloseIcon.classList.remove('hidden');
        } else {
            passwordInput.type = 'password';
            eyeCloseIcon.classList.add('hidden');
            eyeOpenIcon.classList.remove('hidden');
        }
    });
</script>
{% endblock %}
