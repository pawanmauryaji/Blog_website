{% extends "base.html" %}

{% block content %}
<main class="min-h-[85vh] bg-slate-50 px-4 md:px-8 py-12 flex items-center justify-center">
    <div class="max-w-3xl w-full bg-white border border-slate-200 rounded-2xl p-6 md:p-10 shadow-sm">
        
        
        <div class="border-b border-slate-200 pb-6 mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">
                    Edit Your <span class="text-orange-500">Story</span>
                </h1>
                <p class="mt-2 text-sm text-slate-500">
                    Make updates to your technical guide or article.
                </p>
            </div>
            
            <a href="/blogs" class="text-sm font-semibold text-slate-500 hover:text-orange-500 transition-colors flex items-center gap-1">
                ← Cancel
            </a>
        </div>

        
        
        <form action="/blog/edit/{{ blog.id }}" method="POST" class="space-y-6">
            
            
            <div>
                <label for="title" class="block text-sm font-bold text-slate-800 mb-2">Blog Title</label>
                <input 
                    type="text" 
                    id="title" 
                    name="title" 
                    value="{{ blog.title }}" 
                    required
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 focus:outline-none focus:border-orange-500 focus:bg-white transition-all text-sm md:text-base font-medium"
                    placeholder="e.g., Mastering Async Tasks in FastAPI"
                >
            </div>

            
            <div>
                <label for="tag" class="block text-sm font-bold text-slate-800 mb-2">Category Tag</label>
                <input 
                    type="text" 
                    id="tag" 
                    name="tag" 
                    value="{{ blog.tag }}" 
                    required
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-900 focus:outline-none focus:border-orange-500 focus:bg-white transition-all text-sm uppercase tracking-wider font-semibold"
                    placeholder="e.g., FASTAPI, PYTHON, TAILWIND"
                >
            </div>

            
            <div>
                <label for="content" class="block text-sm font-bold text-slate-800 mb-2">Content Body</label>
                <textarea 
                    id="content" 
                    name="content" 
                    rows="10" 
                    required
                    class="w-full px-4 py-3 resize-none bg-slate-50 border border-slate-200 rounded-xl text-slate-900 focus:outline-none focus:border-orange-500 focus:bg-white transition-all text-sm md:text-base leading-relaxed"
                    placeholder="Write your insightful technical guide here..."
                >{{ blog.content }}</textarea>
            </div>

            
            <div class="pt-4 border-t border-slate-100 flex items-center gap-4 justify-end">
                
                <a href="/blogs" class="py-3 px-6 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold text-sm rounded-xl transition-colors cursor-pointer text-center">
                    Discard Changes
                </a>
                
                <button 
                    type="submit" 
                    class="py-3 px-8 bg-orange-500 hover:bg-orange-600 text-white font-semibold text-sm rounded-xl shadow-md shadow-orange-500/10 transition-colors cursor-pointer text-center"
                >
                    Save Changes
                </button>
            </div>

        </form>
    </div>
</main>
{% endblock %}
