{% extends "base.html" %}

{% block content %}
<main class="min-h-[70vh] flex items-center justify-center px-4 py-8 bg-slate-100">
    
    <div class="w-full max-w-sm border border-slate-200 bg-white p-8 rounded-xl shadow-xs">
        
        <div class="mb-8 text-center">
            <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Sign in to DevHub</h2>
            <p class="text-sm text-slate-500 mt-1">Enter your details below</p>
        </div>

        <form action="/auth/login" method="POST" class="space-y-5">
            <div>
                <label for="username" class="block text-xs font-medium text-slate-700 mb-1.5">Username or Email</label>
                <input type="email" id="username" name="username" required autocomplete="username"
                       class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-900 focus:outline-none focus:border-orange-500 focus:bg-white transition-colors">
            </div>

            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label for="password" class="block text-xs font-medium text-slate-700">Password</label>
                    <a href="/auth/forgot-password" class="text-xs text-orange-500 hover:underline">Forgot?</a>
                </div>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                       class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-900 focus:outline-none focus:border-orange-500 focus:bg-white transition-colors">
            </div>

            <button type="submit" 
                    class="w-full bg-orange-500 hover:bg-orange-600 text-white font-medium text-sm py-2.5 rounded-lg transition-colors cursor-pointer shadow-xs mt-2">
                Continue
            </button>
        </form>

        <p class="text-center text-xs text-slate-500 mt-6 pt-4 border-t border-slate-100">
            Don't have an account? <a href="/auth/signup" class="text-orange-500 font-medium hover:underline">Sign up</a>
        </p>

    </div>
</main>
{% endblock %}
