{% extends "base.html" %}

{% block content %}
<main class="min-h-[85vh] bg-slate-50 flex items-center justify-center px-4 py-12">
    

    <div class="w-full max-w-lg bg-white border border-slate-200 p-8 rounded-2xl shadow-xs">
        
      
    
    <div class="w-full max-w-lg bg-white border border-slate-200 p-8 rounded-2xl shadow-xs">
        
        
        <div class="mb-8 pb-6 border-b border-slate-100 text-center sm:text-left">
            <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Contact DevHub Support</h2>
            <p class="text-sm text-slate-500 mt-1">Facing an issue or want to suggest a cool feature? Let us know!</p>
        </div>

        
        <form action="/contact" method="POST" class="space-y-5">
            
           
        
        <form action="/contact" method="POST" class="space-y-5">
            
            
            <div>
                <label for="name" class="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-2">Your Name</label>
                <input type="text" id="name" name="name" required placeholder="John Doe"
                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-900 focus:outline-none focus:border-orange-500 focus:bg-white transition-colors">
            </div>

           
            
            <div>
                <label for="email" class="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-2">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="john@example.com"
                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-900 focus:outline-none focus:border-orange-500 focus:bg-white transition-colors">
            </div>

           
            
            <div>
                <label for="subject" class="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-2">Subject / Topic</label>
                <select id="subject" name="subject" required
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-900 font-medium focus:outline-none focus:border-orange-500 focus:bg-white transition-colors cursor-pointer">
                    <option value="Feature Suggestion" selected> Feature Suggestion </option>
                    <option value="Bug Report"> Bug Report </option>
                    <option value="Account Issue"> Account / Login Issue</option>
                    <option value="Other"> Other Enquiry</option>
                </select>
            </div>

                    <option value="Feature Suggestion" selected>ðŸ’¡ Feature Suggestion </option>
                    <option value="Bug Report">ðŸ› Bug Report </option>
                    <option value="Account Issue">ðŸ”‘ Account / Login Issue</option>
                    <option value="Other">ðŸ“ Other Enquiry</option>
                </select>
            </div>

            
            <div>
                <label for="message" class="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-2">Your Message / Idea</label>
                <textarea id="message" name="message" required rows="6" placeholder="Describe your issue or explain your feature request in detail..."
                          class="w-full resize-none bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-900 focus:outline-none focus:border-orange-500 focus:bg-white transition-colors leading-relaxed"></textarea>
            </div>

           
            
            <button type="submit" 
                    class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold text-sm py-3 rounded-xl transition-colors cursor-pointer shadow-md shadow-orange-500/10 mt-2">
                Send Message
            </button>
            
        </form>

    </div>
</main>
{% endblock %}
